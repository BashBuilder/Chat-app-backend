services:
  user-db:
    image: postgres:16
    container_name: chatapp_user_db
    environment:
      POSTGRES_DB: ${USER_DB_NAME:-chatapp_user_db}
      POSTGRES_USER: ${USER_DB_USER:-chatapp_user}
      POSTGRES_PASSWORD: ${USER_DB_PASSWORD:-chatapp_password}
    ports:
      - '${USER_DB_PORT:-5432}:5432'
    volumes:
      - user-db-data:/var/lib/postgresql/data
    networks:
      - chatapp-network
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${USER_DB_USER:-chatapp_user}']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  mongo:
    image: mongo:latest
    container_name: chatapp-mongo
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-chatapp_mongo}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-chatapp_password}
    ports:
      - '${MONGO_PORT:-27017}:27017'
    volumes:
      - mongo-data:/data/db
    networks:
      - chatapp-network
    healthcheck:
      test: ['CMD', 'mongosh', '--eval', "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      start_period: 30s
      retries: 5

  redis:
    image: redis:latest
    container_name: chatapp-redis
    ports:
      - '${REDIS_PORT:-6379}:6379'
    volumes:
      - redis-data:/data
    networks:
      - chatapp-network
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  rabbitmq:
    image: rabbitmq:3-management
    container_name: chatapp-rabbitmq
    ports:
      - '${RABBITMQ_PORT:-5672}:5672'
      - '${RABBITMQ_MANAGEMENT_PORT:-15672}:15672'
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-guest}
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    networks:
      - chatapp-network
    healthcheck:
      test: ['CMD', 'rabbitmq-diagnostics', '-q', 'ping']
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

  auth-db:
    image: mysql:8.0
    container_name: chatapp-auth-db
    environment:
      MYSQL_DATABASE: ${AUTH_DB_NAME:-chatapp_auth_db}
      MYSQL_USER: ${AUTH_DB_USER:-chatapp_auth_user}
      MYSQL_PASSWORD: ${AUTH_DB_PASSWORD:-chatapp_auth_password}
      MYSQL_ROOT_PASSWORD: ${AUTH_DB_ROOT_PASSWORD:-root_password}
    command: ['mysqld', '--default-authentication-plugin=mysql_native_password']
    ports:
      - '${AUTH_DB_PORT:-3306}:3306'
    volumes:
      - auth-db-data:/var/lib/mysql
    networks:
      - chatapp-network
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'mysqladmin ping -h localhost -u root -p${AUTH_DB_ROOT_PASSWORD:-root_password}',
        ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s

  auth-service:
    build:
      context: .
      dockerfile: services/auth-service/Dockerfile
    container_name: chatapp_auth_service
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      AUTH_SERVICE_PORT: ${AUTH_SERVICE_PORT:-4003}

      AUTH_DB_URL: ${AUTH_DB_URL:-mysql://chatapp_auth_user:chatapp_auth_password@auth-db:3306/chatapp_auth_db}
      INTERNAL_API_TOKEN: ${INTERNAL_API_TOKEN:-chatapp_internal_api_token}

      JWT_SECRET: ${JWT_SECRET:-chatapp_jwt_secret}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-3600}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-3600}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-chatapp_jwt_refresh_secret}

      RABBIT_MQ_URL: ${RABBIT_MQ_URL:-amqp://guest:guest@rabbitmq:5672}

    ports:
      - '${AUTH_SERVICE_PORT:-4003}:4003'

    depends_on:
      auth-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "require('http').get('http://localhost:4003/auth/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - chatapp-network
    restart: no

  user-service:
    build:
      context: .
      dockerfile: services/user-service/Dockerfile
    container_name: chatapp_user_service
    environment:
      # service
      NODE_ENV: ${NODE_ENV:-development}
      USER_SERVICE_PORT: ${USER_SERVICE_PORT:-4001}
      INTERNAL_API_TOKEN: ${INTERNAL_API_TOKEN:-secret}

      # database
      RABBIT_MQ_URL: ${RABBIT_MQ_URL:-amqp://guest:guest@rabbitmq:5672/}
      USER_DB_URL: ${USER_DB_URL:-mysql://chatapp_user:chatapp_password@user-db:3306/chatapp_user_db}

    ports:
      - '${USER_SERVICE_PORT:-4001}:4001'

    depends_on:
      user-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

    networks:
      - chatapp-network
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "require('http').get('http://localhost:4001/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  chat-service:
    build:
      context: .
      dockerfile: services/chat-service/Dockerfile
    container_name: chatapp_chat_service
    environment:
      # service
      NODE_ENV: ${NODE_ENV:-development}
      CHAT_SERVICE_PORT: ${CHAT_SERVICE_PORT:-4002}

      # database
      MONGO_URL: ${MONGO_URL:-mongodb://chatapp_mongo:chatapp_password@mongo:27017/chatapp_chat_db?authSource=admin}
      RABBIT_MQ_URL: ${RABBIT_MQ_URL:-amqp://guest:guest@rabbitmq:5672/}
      REDIS_URL: ${REDIS_URL:-redis://localhost:6379}

      # auth
      INTERNAL_API_TOKEN: ${INTERNAL_API_TOKEN:-secret}
      JWT_SECRET: ${JWT_SECRET:-secret}

    ports:
      - '${CHAT_SERVICE_PORT:-4002}:4002'

    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_started
    networks:
      - chatapp-network
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "require('http').get('http://localhost:4002/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  gateway-service:
    build:
      context: .
      dockerfile: services/gateway-service/Dockerfile
    container_name: chatapp_gateway_service
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      INTERNAL_API_TOKEN: ${INTERNAL_API_TOKEN:-secret}
      # port
      GATEWAY_SERVICE_PORT: ${GATEWAY_SERVICE_PORT:-4000}
      # jwt
      JWT_SECRET: ${JWT_SECRET:-secret}
      # urls
      USER_SERVICE_URL: ${USER_SERVICE_URL:-http://localhost:4001}
      CHAT_SERVICE_URL: ${CHAT_SERVICE_URL:-http://localhost:4002}
      AUTH_SERVICE_URL: ${AUTH_SERVICE_URL:-http://localhost:4003}

    ports:
      - '${GATEWAY_SERVICE_PORT:-4000}:4000'
    depends_on:
      auth-service:
        condition: service_healthy
      chat-service:
        condition: service_healthy
      user-service:
        condition: service_healthy
    networks:
      - chatapp-network
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "require('http').get('http://localhost:4000/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

volumes:
  user-db-data:
  auth-db-data:
  mongo-data:
  redis-data:
  rabbitmq-data:

networks:
  chatapp-network:
    driver: bridge
